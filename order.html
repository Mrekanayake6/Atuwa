<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atuwa - Order Product</title>
    <link rel="icon" type="image/png" sizes="120x120" href="images/logo main.png">
    <link rel="stylesheet" href="css2/order.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

   
  
</head>

<body>

    <div class="order-container">

        <div class="order-header">
            <span class="eyebrow">Atuwa &middot; Checkout</span>
            <h2>Complete your order</h2>
        </div>

        <div class="order-body">

            <section>
                <div class="step-label">
                    <span class="num">1</span>
                    <span class="text">Your order</span>
                </div>

                <div class="product-box">
                    <img src="" alt="Product" id="productImage">
                    <div class="product-info">
                        <h3 id="productName"></h3>
                        <h3 id="productWeight">1 KG</h3>
                        <h3 id="deliveryCharge">🚚 Delivery charge: Rs. 200</h3>
                        <div class="price" id="productPrice"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Quantity</label>
                    <input id="qty" type="number" min="1" value="1">
                </div>

                <div id="totalPrice" class="total"></div>
            </section>

            <section>
                <div class="step-label">
                    <span class="num">2</span>
                    <span class="text">Delivery details</span>
                </div>

                <div class="form-group">
                    <label>Full name</label>
                    <input type="text" id="customerName" placeholder="Enter your name">
                </div>

                <div class="form-group">
                    <label>Delivery address</label>
                    <textarea id="deliveryAddress" placeholder="Enter your delivery address" rows="3"></textarea>
                </div>
            </section>

            <section>
                <div class="step-label">
                    <span class="num">3</span>
                    <span class="text">Payment</span>
                </div>

                <div class="bank-details">
                    <div class="bank-details__header">
                        <span class="bank-details__icon">🏦</span>
                        <h4>Bank transfer details</h4>
                    </div>

                    <dl class="bank-details__list">
                        <div class="bank-details__row">
                            <dt>Bank</dt>
                            <dd>Commercial Bank</dd>
                        </div>
                        <div class="bank-details__row">
                            <dt>Account name</dt>
                            <dd>Atua</dd>
                        </div>
                        <div class="bank-details__row">
                            <dt>Account number</dt>
                            <dd class="mono">1234567890</dd>
                        </div>
                        <div class="bank-details__row">
                            <dt>Branch</dt>
                            <dd>Kurunegala</dd>
                        </div>
                    </dl>

                    <p class="bank-details__note">
                        📩 After payment, please send the payment slip via WhatsApp.
                    </p>
                </div>

                <button class="order-btn" onclick="sendWhatsApp()">
                    Order via WhatsApp
                </button>
            </section>

        </div>
    </div>

    <script src="js/or.js"></script>
</body>

</html>
