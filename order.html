<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atua - Order Product</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f7f5;
            padding: 20px;
        }

        .order-container {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #2e7d32;
            margin-bottom: 20px;
        }

        .product-box {
            display: flex;
            gap: 15px;
            align-items: center;
            background: #f8f8f8;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .product-box img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 10px;
        }

        .product-info h3 {
            margin-bottom: 5px;
        }

        .price {
            color: #2e7d32;
            font-size: 20px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .payment-box {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .payment-option {
            flex: 1;
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
        }

        .payment-option:hover {
            border-color: #2e7d32;
        }

        .total {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 20px;
        }

        .order-btn {
            width: 100%;
            margin-top: 20px;
            background: #25D366;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
        }

        .order-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <div class="order-container">

        <h2>Complete Your Order</h2>

        <div class="product-box">
            <img src="" alt="Product" id="productImage">
            <div class="product-info">
                <h3 id="productName"></h3>
                <h3>1 KG</h3>
                <h3 >
                    🚚 Delivery Charge: Rs. 200
                </h3>
                <div class="price" id="productPrice"></div>
            </div>
        </div>

        <div class="form-group">
            <label>Quantity</label>
            <input id="qty" type="number" min="1" value="1">
        </div>

        <div id="totalPrice" class="total">

        </div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name">
        </div>



        <div class="form-group">
            <label>Delivery Address</label>
            <textarea rows="3"></textarea>
        </div>

        <div class="form-group">
            <label>Payment Method</label>

            <div class="payment-box">


                <div class="bank-details">
                    <h4>🏦 Bank Transfer Details</h4>

                    <div class="detail-row">
                        <span>Bank</span>
                        <strong>Commercial Bank</strong>
                    </div>

                    <div class="detail-row">
                        <span>Account Name</span>
                        <strong>Atua</strong>
                    </div>

                    <div class="detail-row">
                        <span>Account Number</span>
                        <strong>1234567890</strong>
                    </div>

                    <div class="detail-row">
                        <span>Branch</span>
                        <strong>Kurunegala</strong>
                    </div>

                    <p class="note">
                        📌 After payment, send the payment slip via WhatsApp.
                    </p>
                </div>
            </div>
        </div>



        <button class="order-btn">
            Order via WhatsApp
        </button>

    </div>


    <script src="js/or.js"></script>
</body>

</html>
